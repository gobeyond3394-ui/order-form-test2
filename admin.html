<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>싸U 관리자</title>
<style>
  :root{
    --bg:#ffffff;
    --panel:#ffffff;
    --surface:#ffffff;
    --surface-soft:#ffffff;
    --ink:#111827;
    --muted:#667085;
    --line:#e5e7eb;
    --line-strong:#d9dee6;
    --brand:#0f172a;
    --brand-strong:#0f172a;
    --brand-soft:#eef2f7;
    --brand-line:#d8e0ea;
    --flash:#ffe066;
    --flash-strong:#8a5c00;
    --warning:#ffedd5;
    --warning-strong:#9a5600;
    --danger:#111827;
    --danger-soft:#fff1ef;
    --shadow:none;
    --radius-xl:28px;
    --radius-lg:22px;
    --radius-md:18px;
    --radius-sm:14px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);width:100%;max-width:100%;overflow-x:hidden;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-top:calc(92px + var(--safe-top));
    padding-bottom:calc(42px + var(--safe-bottom));
  }
  button,input,select,textarea{font:inherit;}
  button{border:0;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  img{display:block;max-width:100%;}
  .hidden{display:none!important;}

  .topbar{
    position:fixed;inset:0 0 auto 0;z-index:80;
    background:#ffffff;
    box-shadow:none;
    border-bottom:0;
    padding-top:var(--safe-top);
  }
  .topbar:after{display:none;}
  .topbar-inner{
    width:100%;max-width:760px;min-width:0;margin:0 auto;min-height:78px;padding:12px 16px 14px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:12px;min-width:0;flex:1 1 auto;}
  .brand-mark{
    width:58px;height:58px;border-radius:999px;overflow:hidden;flex:0 0 auto;
    box-shadow:none;background:#ffffff;
  }
  .brand-mark img{width:100%;height:100%;object-fit:cover;}
  .brand-copy{min-width:0;}
  .brand-copy strong{
    display:block;font-size:18px;font-weight:950;letter-spacing:-.03em;color:#111827;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .brand-copy span{
    display:block;margin-top:4px;font-size:12px;font-weight:800;color:#667085;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .top-actions{display:flex;gap:8px;flex:0 0 auto;min-width:0;}
  .top-btn{
    width:44px;height:44px;min-height:44px;padding:0;border-radius:999px;border:0;background:transparent;
    display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#111827;
    white-space:nowrap;box-shadow:none;flex:0 0 auto;
  }
  .top-btn svg{width:22px;height:22px;stroke:currentColor;}

  .page{width:100%;max-width:760px;min-width:0;margin:0 auto;padding:16px 16px 32px;background:#ffffff;}

  .stats-panel{
    display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;
    padding:18px;border-radius:28px;background:#ffffff;border:1px solid #ffffff;width:100%;min-width:0;
  }
  .stat-card{
    min-height:92px;padding:16px 14px;border-radius:22px;background:#fff;border:1px solid var(--line-strong);
    display:flex;flex-direction:column;justify-content:center;gap:6px;text-align:left;
  }
  .stat-card strong{font-size:24px;line-height:1;font-weight:950;letter-spacing:-.04em;color:var(--ink);}
  .stat-card span{font-size:12px;line-height:1.45;font-weight:900;color:#475467;}
  .stat-card.is-active{background:#0f172a;border-color:#0f172a;}
  .stat-card.is-active strong,.stat-card.is-active span{color:#fff;}

  .section{
    margin-top:18px;padding:20px;border-radius:28px;background:#ffffff;border:1px solid #ffffff;width:100%;min-width:0;overflow:hidden;
  }
  .section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;}
  .section-title{margin:0;font-size:20px;line-height:1.2;font-weight:950;letter-spacing:-.03em;color:#111827;}
  .section-sub{display:none;}
  .pill-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;}
  .status-pill{
    min-height:34px;padding:0 12px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:950;border:1px solid var(--line);background:#fff;color:#334155;
  }
  .status-pill.flash{background:#fff4c7;border-color:#f4d86d;color:#8a5c00;}
  .status-pill.soon{background:#fff1d9;border-color:#ffd19d;color:#9a5600;}
  .status-pill.sold{background:#111827;border-color:#111827;color:#fff;}

  .edit-banner{
    display:none;margin-bottom:16px;padding:14px 16px;border-radius:18px;background:#fff7dc;border:1px solid #f4e1a0;
    color:#7c5b00;font-size:13px;line-height:1.55;font-weight:900;
  }
  .edit-banner.show{display:flex;align-items:center;justify-content:space-between;gap:12px;}

  .editor-grid{display:grid;grid-template-columns:1.02fr .98fr;gap:16px;align-items:start;min-width:0;}
  .upload-panel{
    padding:16px;border-radius:24px;background:var(--surface);border:1px solid var(--line-strong);display:grid;gap:12px;min-width:0;
  }
  .preview-box{
    position:relative;overflow:hidden;border-radius:22px;background:#edf2f7;border:1px solid var(--line);aspect-ratio:1 / 1.12;
  }
  .preview-box img{width:100%;height:100%;object-fit:cover;display:none;}
  .preview-box.empty:before{
    content:"사진을 촬영하거나 앨범에서 골라주세요.";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    padding:20px;text-align:center;font-size:14px;line-height:1.55;font-weight:900;color:#64748b;
  }
  .preview-badges,.photo-badges{position:absolute;left:10px;top:10px;display:flex;flex-wrap:wrap;gap:6px;z-index:2;}
  .photo-badge{
    min-height:26px;padding:0 9px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;gap:4px;
    font-size:11px;font-weight:950;letter-spacing:-.02em;
  }
  .photo-badge.flash{background:#fff2b0;color:#8b5b00;}
  .photo-badge.soon{background:#fff1d9;color:#9a5600;}
  .photo-badge.sold{background:#111827;color:#fff;}

  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .btn{
    min-height:50px;padding:0 16px;border-radius:20px;display:inline-flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:950;
  }
  .btn.primary{background:#111827;color:#fff;}
  .btn.secondary{background:#fff;border:1px solid var(--line-strong);color:#334155;}
  .btn.brand{background:#111827;color:#fff;}
  .btn.danger{background:#fff1ef;border:1px solid #ffd5cf;color:#d92d20;}

  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;min-width:0;}
  .field{display:flex;flex-direction:column;gap:7px;}
  .field.full{grid-column:1 / -1;}
  .field label{font-size:13px;font-weight:900;color:#334155;letter-spacing:-.01em;}
  .field input,.field select,.field textarea{
    width:100%;min-height:56px;border-radius:22px;border:1px solid var(--line-strong);background:#fff;padding:0 18px;font-size:15px;color:#0f172a;
  }
  .field textarea{min-height:100px;padding:16px 18px;resize:vertical;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#c5ceda;box-shadow:0 0 0 4px rgba(15,23,42,.05);}
  .field-help{font-size:12px;line-height:1.55;font-weight:700;color:var(--muted);}

  .toggle-group{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
  .toggle-chip{
    min-height:52px;border-radius:22px;border:1px solid var(--line-strong);background:#fff;color:#374151;
    display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:950;
  }
  .toggle-chip.active.flash{background:#fff2b0;border-color:#f4d86d;color:#8b5b00;}
  .toggle-chip.active.soon{background:#fff1d9;border-color:#ffd19d;color:#9a5600;}
  .toggle-chip.active.sold{background:#111827;border-color:#111827;color:#fff;}

  .option-title{margin:4px 0 10px;font-size:18px;font-weight:950;letter-spacing:-.03em;color:#111827;}
  .option-sub{margin:0 0 14px;font-size:13px;line-height:1.55;font-weight:700;color:var(--muted);}
  .option-toolbar-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:12px;min-width:0;}
  .soft-input-group{
    display:flex;flex-direction:column;align-items:stretch;gap:8px;min-height:0;padding:10px;border-radius:26px;border:1px solid var(--line-strong);background:#fff;min-width:0;
  }
  .soft-input-group input{
    width:100%;min-width:0;height:50px;border:0;outline:none;background:#f8fafc;padding:0 18px;font-size:14px;font-weight:800;color:#111827;border-radius:18px;
  }
  .soft-input-group input::placeholder{color:#98a2b3;}
  .soft-add-btn{
    width:100%;flex:0 0 auto;height:44px;padding:0 16px;border-radius:16px;border:1px solid var(--line);background:#f3f4f6;color:#344054;font-size:13px;font-weight:900;
  }
  .added-token-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .added-token{
    min-height:38px;padding:0 14px;border-radius:999px;border:1px solid var(--line-strong);background:#fff;
    display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:900;color:#334155;
  }
  .added-token button{
    width:20px;height:20px;border-radius:999px;background:#f3f4f6;color:#667085;font-size:12px;font-weight:900;
    display:inline-flex;align-items:center;justify-content:center;padding:0;
  }
  .added-token.is-placeholder{border-style:dashed;background:transparent;color:#98a2b3;}
  .preset-chip-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .preset-chip{
    min-height:40px;padding:0 14px;border-radius:999px;border:1px solid var(--line-strong);background:#fff;color:#334155;
    display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;
  }
  .preset-chip.is-selected{background:#111827;border-color:#111827;color:#fff;}

  .color-board{display:grid;gap:12px;margin-top:12px;}
  .color-empty{
    border:1px dashed #d5dbe5;border-radius:18px;padding:16px 14px;text-align:center;background:#fbfcfe;
    font-size:13px;line-height:1.6;font-weight:800;color:#667085;
  }
  .color-card{border:1px solid var(--line-strong);border-radius:22px;padding:14px;background:#fff;}
  .color-card.is-soldout{background:#fbfcff;border-color:#d8dee8;}
  .color-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
  .color-card-title{min-width:0;}
  .color-card-title strong{display:block;font-size:16px;font-weight:950;color:#111827;letter-spacing:-.02em;}
  .color-card-title span{display:block;margin-top:5px;font-size:12px;font-weight:800;color:var(--muted);}
  .color-card-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
  .tiny-btn{
    min-height:36px;padding:0 12px;border-radius:12px;border:1px solid var(--line-strong);background:#fff;color:#334155;
    display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;
  }
  .tiny-btn.danger{background:#fff1ef;border-color:#ffd5cf;color:#d92d20;}
  .tiny-check{
    min-height:36px;padding:0 12px;border-radius:12px;border:1px solid var(--line-strong);background:#fff;color:#334155;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:12px;font-weight:900;
  }
  .tiny-check input,.mini-check input{width:16px;height:16px;accent-color:#111827;}
  .size-tile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;min-width:0;}
  .size-tile{padding:12px;border-radius:18px;background:#f8fbff;border:1px solid #dce9f7;display:flex;flex-direction:column;gap:10px;}
  .size-tile.is-enabled{border-color:#bfd8f3;background:#f3f9ff;}
  .size-tile.is-soldout{background:#fbfbfc;border-color:#e5e7eb;}
  .size-tile-name{font-size:14px;font-weight:950;color:#111827;letter-spacing:-.01em;}
  .size-tile-controls{display:grid;gap:8px;}
  .mini-check{
    min-height:34px;padding:0 10px;border-radius:12px;border:1px solid var(--line-strong);background:#fff;color:#334155;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:12px;font-weight:900;
  }

  .action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}

  .list-toolbar{display:block;margin-bottom:12px;min-width:0;}
  .search-shell{
    position:relative;display:flex;align-items:center;border:1px solid var(--line-strong);border-radius:999px;background:#fff;overflow:hidden;min-width:0;width:100%;
  }
  .search-shell svg{position:absolute;left:24px;top:50%;transform:translateY(-50%);width:22px;height:22px;color:#98a2b3;pointer-events:none;flex:0 0 auto;}
  .search-shell input{
    width:100%;min-width:0;min-height:56px;padding:0 20px 0 60px;border:0;background:transparent;font-size:15px;font-weight:900;color:#475467;
  }
  .search-shell input::placeholder{color:#667085;opacity:1;}
  .search-shell input:focus{outline:none;}
  .filter-chip-row{display:flex;gap:8px;overflow:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:14px;}
  .filter-chip-row::-webkit-scrollbar{display:none;}
  .filter-chip{
    min-height:38px;padding:0 14px;border-radius:999px;border:1px solid var(--line-strong);background:#fff;color:#334155;font-size:13px;font-weight:900;white-space:nowrap;
  }
  .filter-chip.is-active{background:#111827;border-color:#111827;color:#fff;}

  .product-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;min-width:0;}
  .product-card{border:1px solid var(--line-strong);border-radius:24px;overflow:hidden;background:#fff;}
  .product-thumb{position:relative;aspect-ratio:1 / 1.12;background:#eef2f7;overflow:hidden;}
  .product-thumb img{width:100%;height:100%;object-fit:cover;}
  .product-body{padding:14px;}
  .product-name{
    font-size:15px;font-weight:950;line-height:1.4;letter-spacing:-.02em;color:#0f172a;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:42px;
  }
  .product-price{margin-top:10px;font-size:24px;font-weight:950;letter-spacing:-.04em;color:#0f172a;}
  .product-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
  .empty-state{
    border:1px dashed #d5dbe5;border-radius:18px;padding:20px 16px;text-align:center;background:#fbfcfe;
    font-size:13px;line-height:1.65;font-weight:800;color:#667085;grid-column:1 / -1;
  }

  .toast{
    position:fixed;left:50%;bottom:calc(22px + var(--safe-bottom));transform:translate(-50%,18px);
    background:#111827;color:#fff;padding:12px 16px;border-radius:999px;font-size:13px;font-weight:900;z-index:120;opacity:0;pointer-events:none;
    transition:opacity .18s ease, transform .18s ease;box-shadow:0 18px 34px rgba(15,23,42,.24);white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translate(-50%,0);}

  .success-overlay{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.92);z-index:140;opacity:0;pointer-events:none;
    background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border:1px solid rgba(229,231,235,.96);
    box-shadow:0 24px 48px rgba(15,23,42,.16);border-radius:28px;padding:24px 22px 20px;min-width:220px;text-align:center;
    transition:opacity .2s ease, transform .2s ease;
  }
  .success-overlay.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  .success-circle{
    width:88px;height:88px;margin:0 auto 14px;border-radius:999px;background:linear-gradient(135deg,#e8f3ff,#f7fbff);
    display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:950;color:#0b66c2;box-shadow:0 12px 24px rgba(11,102,194,.12);
  }
  .success-title{font-size:22px;font-weight:950;letter-spacing:-.03em;color:#111827;}
  .success-sub{margin-top:6px;font-size:13px;line-height:1.55;font-weight:800;color:#667085;}

  @media (max-width:560px){
    .stats-panel,.section,.upload-panel,.product-card,.search-shell,.soft-input-group{min-width:0;max-width:100%;}
    .topbar-inner,.page{padding-left:14px;padding-right:14px;}
    .stat-card{min-height:84px;padding:14px 12px;}
    .stat-card strong{font-size:22px;}
    .stat-card span{font-size:11px;}
    .color-card-head{flex-direction:column;align-items:flex-start;}
    .color-card-actions{justify-content:flex-start;}
    .size-tile-grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));}
  }

  @media (max-width:720px){
    .editor-grid{grid-template-columns:1fr;}
  }
  @media (max-width:640px){
    .stats-panel{grid-template-columns:repeat(2,minmax(0,1fr));}
    .product-grid{grid-template-columns:1fr;}
    .field-grid,.option-toolbar-grid{grid-template-columns:1fr;}
    .btn-row,.product-actions{grid-template-columns:1fr;}
  }
  @media (max-width:480px){
    body{padding-top:calc(86px + var(--safe-top));}
    .topbar-inner{padding:10px 14px 12px;min-height:72px;gap:10px;}
    .brand{gap:10px;}
    .brand-mark{width:52px;height:52px;border-radius:999px;}
    .brand-copy strong{font-size:17px;}
    .brand-copy span{font-size:11px;}
    .page{padding-left:14px;padding-right:14px;}
    .section{padding:16px;}
    .toggle-group{grid-template-columns:1fr;}
    .product-price{font-size:22px;}
    .success-overlay{width:min(92vw,320px);}
    .top-btn{min-height:40px;width:40px;height:40px;padding:0;font-size:13px;}
  }
</style>
</head>
<body>
<header class="topbar">

  function escapeHtml(value) {

  function apiReady() {
    return API && API.indexOf('PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_EXEC_URL_HERE') === -1;
  }

  function appendQuery(url, key, value) {
    const separator = url.indexOf('?') >= 0 ? '&' : '?';
    return url + separator + encodeURIComponent(key) + '=' + encodeURIComponent(value);
  }

  function normalizeBridgeMessageData(value) {
    if (!value) return null;
    if (typeof value === 'string') {
      try { value = JSON.parse(value); } catch (error) { return null; }
    }
    return (value && typeof value === 'object') ? value : null;
  }

  function readResponseSafe(value) {
    if (!value) return { ok: false, text: '', json: null };
    if (typeof value === 'object' && 'json' in value && 'text' in value) return value;
    const text = typeof value === 'string' ? value : JSON.stringify(value || {});
    let json = null;
    try { json = text ? JSON.parse(text) : null; } catch (error) { json = (typeof value === 'object' ? value : null); }
    return { ok: true, text, json };
  }

  function isFailure(result) {
    if (!result) return true;
    if (result.json && result.json.ok === false) return true;
    return false;
  }

  function failureMessage(result, fallback) {
    if (!result) return fallback;
    if (result.json && result.json.message) return result.json.message;
    if (result.text && !/^\s*</.test(result.text) && result.text.trim()) return result.text.trim();
    return fallback;
  }

  function getJsonValue(obj, key) {
    if (!obj) return '';
    if (obj.message && typeof obj.message === 'object' && key in obj.message) return obj.message[key];
    if (key in obj) return obj[key];
    return '';
  }

  function jsonpRequest(url, timeoutMs) {
    if (!apiReady()) return Promise.reject(new Error('GAS 웹앱 URL을 먼저 입력해주세요.'));
    const timeout = Number(timeoutMs || 15000);
    return new Promise((resolve, reject) => {
      const callbackName = '__ssu_admin_jsonp_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2);
      const script = document.createElement('script');
      let timer = null;

      function cleanup() {
        if (timer) clearTimeout(timer);
        if (script.parentNode) script.parentNode.removeChild(script);
        try { delete window[callbackName]; } catch (error) { window[callbackName] = undefined; }
      }

      window[callbackName] = (data) => {
        cleanup();
        resolve(data);
      };

      script.onerror = () => {
        cleanup();
        reject(new Error('상품 정보를 불러오지 못했습니다.'));
      };

      timer = setTimeout(() => {
        cleanup();
        reject(new Error('서버 응답 시간이 초과되었습니다.'));
      }, timeout);

      script.src = appendQuery(url, 'prefix', callbackName);
      document.head.appendChild(script);
    });
  }

  async function postJson(payload) {
    if (!apiReady()) throw new Error('GAS 웹앱 URL을 먼저 입력해주세요.');
    const frame = document.getElementById('ssuGasBridgeFrame');
    const requestId = 'req_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2);

    const response = await new Promise((resolve, reject) => {
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = API;
      form.target = frame.name;
      form.style.display = 'none';

      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'payload';
      input.value = JSON.stringify(Object.assign({}, payload, {
        requestId,
        responseMode: 'postMessage',
        origin: window.location.origin
      }));
      form.appendChild(input);
      document.body.appendChild(form);

      let timer = null;

      function cleanup() {
        if (timer) clearTimeout(timer);
        window.removeEventListener('message', onMessage);
        if (form.parentNode) form.parentNode.removeChild(form);
      }

      function onMessage(event) {
        const data = normalizeBridgeMessageData(event && event.data);
        if (!data) return;
        if (data.source !== API_BRIDGE_SOURCE) return;
        if (data.requestId !== requestId) return;
        cleanup();
        resolve(data.response || { ok: false, message: '응답 데이터가 비어 있습니다.' });
      }

      window.addEventListener('message', onMessage);
      timer = setTimeout(() => {
        cleanup();
        reject(new Error('서버 응답 시간이 초과되었습니다.'));
      }, API_REQUEST_TIMEOUT_MS);

      form.submit();
    });

    return readResponseSafe(response);
  }

      localStorage.setItem('ssu_product_catalog_changed', now);

  }

  function normalizeSize(size) {
    if (typeof size === 'string' || typeof size === 'number') {
      const text = String(size).trim();
      return text ? { value: text, label: text, soldOut: false } : null;
    }
    if (!size) return null;
    const value = String(size.value || size.size || size.name || size.label || '').trim();
    if (!value) return null;
    return {
      value,
      label: String(size.label || value).trim() || value,
      soldOut: !!(size.soldOut || size.soldout || size.isSoldOut)
    };
  }

  function allOptionsSoldOut(product) {
    const colors = Array.isArray(product.colorOptions) ? product.colorOptions : [];
    if (!colors.length) return false;
    return colors.every((color) => (color.sizes || []).length && (color.sizes || []).every((size) => size.soldOut));
  }

  function normalizeProduct(raw) {
    const options = raw && typeof raw.options === 'object' ? raw.options : {};
    const badges = Array.isArray(raw && raw.badges) ? raw.badges.map((item) => String(item).trim()).filter(Boolean)
      : Array.isArray(options.badges) ? options.badges.map((item) => String(item).trim()).filter(Boolean)
      : [];
    const productType = String((raw && (raw.productType || raw.type)) || options.productType || '의류').trim() || '의류';
    const colorSource = Array.isArray(raw && raw.colorOptions) ? raw.colorOptions : (Array.isArray(options.colorOptions) ? options.colorOptions : []);
    const product = {
      id: String(raw && raw.id || '').trim(),
      name: String(raw && raw.name || '').trim(),
      price: Number(raw && raw.price || 0),
      image: String(raw && raw.image || raw && raw.imageUrl || '').trim(),
      productType,
      flashSale: !!((raw && raw.flashSale) || options.flashSale),
      badges,
      liveNote: String((raw && raw.liveNote) || options.liveNote || '').trim(),
      createdAt: String((raw && raw.createdAt) || options.createdAt || '').trim(),
      updatedAt: String((raw && raw.updatedAt) || options.updatedAt || '').trim(),
      colorOptions: colorSource.map((color) => {
        const sizes = Array.isArray(color && color.sizes) ? color.sizes.map(normalizeSize).filter(Boolean) : [];
        return {
          value: String((color && (color.value || color.label)) || '').trim(),
          label: String((color && (color.label || color.value)) || '').trim() || String((color && color.value) || '').trim(),
          type: String((color && color.type) || productType || '의류').trim(),
          soldOut: !!(color && color.soldOut) || (!!sizes.length && sizes.every((size) => size.soldOut)),
          sizes
        };
      }).filter((color) => color.value)
    };
    if (product.flashSale && product.badges.indexOf('플래시 상품') === -1) product.badges.unshift('플래시 상품');
    product.isSoldOutSoon = product.badges.indexOf('품절임박') >= 0;
    product.isSoldOut = product.badges.indexOf('품절') >= 0 || allOptionsSoldOut(product);
    return product;
  }

  function parseTimeValue(value) {
    const text = String(value || '').trim();
    if (!text) return null;
    if (/^\d{13}$/.test(text)) return Number(text);
    if (/^\d{10}$/.test(text)) return Number(text) * 1000;
    const time = Date.parse(text);
    return Number.isFinite(time) ? time : null;
  }

  function sortProducts(list) {
    return list.slice().sort((a, b) => {
      const aTime = parseTimeValue(a.updatedAt) || parseTimeValue(a.createdAt);
      const bTime = parseTimeValue(b.updatedAt) || parseTimeValue(b.createdAt);
      if (aTime && bTime && aTime !== bTime) return bTime - aTime;
      if (aTime && !bTime) return -1;
      if (!aTime && bTime) return 1;
      return 0;
    });
  }

  function getPresetSizes(type) {
    return (SIZE_PRESETS[type] || SIZE_PRESETS['기타']).slice();
  }

    .filter((item, index, arr) => arr.indexOf(item) === index)
    .join(',');

function addCustomSizes(textValue) {
  const inputValue = String(textValue || '').trim();
  if (!inputValue) {
    showToast('추가할 사이즈를 입력해주세요.');
    return;
  }
  const next = getCustomSizeList();
  let addedCount = 0;
  inputValue.split(',').map((item) => item.trim()).filter(Boolean).forEach((item) => {
    if (next.indexOf(item) === -1) {
      next.push(item);
      addedCount += 1;
    }
  });
  if (!addedCount) {
    showToast('이미 들어있는 사이즈예요.');
    return;
  }
  setCustomSizeList(next);
  if (els.newSizeInput) els.newSizeInput.value = '';
  renderCustomSizeChips();
  renderColorBoard();
}

function removeCustomSize(sizeValue) {
  const target = String(sizeValue || '').trim();
  if (!target) return;
  setCustomSizeList(getCustomSizeList().filter((item) => item !== target));
  renderCustomSizeChips();
  renderColorBoard();
}

function getAllSizeKeys() {
  const preset = getPresetSizes(state.form.productType);
  const extra = getCustomSizeList();
  const merged = [];
  preset.concat(extra).forEach((item) => {
    if (merged.indexOf(item) === -1) merged.push(item);
  });
  if (!merged.length) merged.push('FREE');
  return merged;
}

  function ensureColorStates() {

          color.sizeStates[sizeKey] = { enabled: false, soldOut: false };

      const data = await jsonpRequest(API + '?type=productVersion&_ts=' + Date.now());
      return String((data && data.version) || '');
    } catch (error) {
      return '';
    }
  }

  async function loadProducts(force) {
    if (!apiReady()) {
      els.productList.innerHTML = '<div class="empty-state">GAS 웹앱 URL을 먼저 입력해주세요.</div>';
      return;
    }
    try {
      let nextVersion = state.productVersion || '';
      if (!force) {
        nextVersion = await fetchProductVersion();
      }
      const shouldReload = force || !state.products.length || !state.productVersion || (nextVersion && nextVersion !== state.productVersion);
      if (!shouldReload) return;
      const data = await jsonpRequest(API + '?type=products&_ts=' + Date.now());
      const rows = Array.isArray(data) ? data : (data && Array.isArray(data.items) ? data.items : []);
      state.products = sortProducts(rows.map(normalizeProduct));
      state.productVersion = nextVersion || String(Date.now());
      saveCache(rows, state.productVersion);
      renderProductList();
    } catch (error) {
      console.error(error);
      if (!state.products.length) {
        els.productList.innerHTML = '<div class="empty-state">상품 목록을 불러오지 못했습니다.</div>';
      }
    }
  }

  function startVersionPolling() {
    if (versionPollTimer) clearInterval(versionPollTimer);
    versionPollTimer = setInterval(() => {
      if (document.hidden) return;
      loadProducts(false);
    }, CONFIG.versionPollMs);
  }

  function buildBadges() {
    const badges = [];
    if (state.form.flashSale) badges.push('플래시 상품');
    if (state.form.soldOutSoon) badges.push('품절임박');
    if (state.form.soldOut) badges.push('품절');
    return badges;
  }

  function buildOptionsPayload() {
    ensureColorStates();
    const colorOptions = state.form.colors.map((color) => {
      const sizes = Object.keys(color.sizeStates || {})
        .filter((sizeKey) => color.sizeStates[sizeKey].enabled)
        .map((sizeKey) => ({
          value: sizeKey,
          label: sizeKey,
          soldOut: !!state.form.soldOut || !!color.soldOut || !!color.sizeStates[sizeKey].soldOut
        }));
      return {
        value: color.label,
        label: color.label,
        type: state.form.productType,
        soldOut: !!state.form.soldOut || !!color.soldOut,
        sizes
      };
    }).filter((color) => color.value && color.sizes.length);

    const timestamp = String(Date.now());
    return {
      productType: state.form.productType,
      colorOptions,
      flashSale: !!state.form.flashSale,
      badges: buildBadges(),
      liveNote: '',
      createdAt: state.editingId ? undefined : timestamp,
      updatedAt: timestamp
    };
  }

  function validateForm() {
    syncFormFromInputs();
    if (!state.form.name) {
      showToast('상품명을 입력해주세요.');
      els.nameInput.focus();
      return false;
    }
    const priceNum = Number(state.form.price || 0);
    if (!priceNum || priceNum <= 0) {
      showToast('가격을 올바르게 입력해주세요.');
      els.priceInput.focus();
      return false;
    }
    if (!state.form.imageUrl && !state.form.imageBase64) {
      showToast('상품 사진을 먼저 준비해주세요.');
      return false;
    }
    const options = buildOptionsPayload();
    if (!options.colorOptions.length) {
      showToast('색상과 사이즈를 1개 이상 선택해주세요.');
      return false;
    }
    const hasSelectable = options.colorOptions.some((color) => (color.sizes || []).some((size) => !size.soldOut));
    if (!state.form.soldOut && !hasSelectable) {
      showToast('선택 가능한 옵션이 없으면 품절을 켜주세요.');
      return false;
    }
    return true;
  }

  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  async function compressImageFile(file) {
    const dataUrl = await fileToDataUrl(file);
    const img = await loadImage(dataUrl);
    const maxSide = 1280;
    let width = img.width;
    let height = img.height;
    if (width > height && width > maxSide) {
      height = Math.round(height * (maxSide / width));
      width = maxSide;
    } else if (height >= width && height > maxSide) {
      width = Math.round(width * (maxSide / height));
      height = maxSide;
    }
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d', { alpha: false });
    ctx.drawImage(img, 0, 0, width, height);
    return canvas.toDataURL('image/jpeg', 0.82).split(',')[1];
  }

  async function handleImageFile(file) {
    if (!file) return;
    try {
      const base64 = await compressImageFile(file);
      state.form.imageBase64 = base64;
      state.form.fileName = (file.name || 'product').replace(/\.[^.]+$/, '') + '.jpg';
      renderPreview();
      showSuccess('사진 준비 완료', '미리보기로 바로 확인할 수 있어요.');
    } catch (error) {
      console.error(error);
      showToast(error && error.message ? error.message : '이미지 처리 중 오류가 발생했습니다.');
    }
  }

  function editProduct(productId) {
    const product = state.products.find((item) => item.id === productId);
    if (!product) return;
    state.editingId = product.id;
    state.form = {
      id: product.id,
      name: product.name,
      price: String(product.price),
      productType: product.productType || '의류',
      liveNote: '',
      flashSale: !!product.flashSale,
      soldOutSoon: !!product.isSoldOutSoon,
      soldOut: !!product.isSoldOut,
      imageUrl: product.image,
      imageBase64: '',
      fileName: '',
      customSizes: extractCustomSizesFromProduct(product),
      colors: (product.colorOptions || []).map((color) => {
        const sizeStates = {};
        (color.sizes || []).forEach((size) => {
          sizeStates[size.value] = {
            enabled: true,
            soldOut: !!size.soldOut
          };
        });
        return {
          id: uid('color'),
          value: color.value,
          label: color.label,
          soldOut: !!color.soldOut || ((color.sizes || []).length > 0 && (color.sizes || []).every((size) => size.soldOut)),
          sizeStates
        };
      })
    };
    renderForm();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }


function resetForm() {
  state.editingId = '';
  state.form = getInitialForm();
  els.cameraInput.value = '';
  els.albumInput.value = '';
  if (els.newColorInput) els.newColorInput.value = '';
  if (els.newSizeInput) els.newSizeInput.value = '';
  renderForm();
}

  function getResultPayload(result) {
    if (result && result.json && result.json.message && typeof result.json.message === 'object') return result.json.message;
    if (result && result.json && typeof result.json === 'object') return result.json;
    return {};
  }

  function refreshLocalProductState() {
    state.productVersion = String(Date.now());
    saveCache(state.products, state.productVersion);
    renderProductList();
  }

  function buildLocalProductSnapshot(savedId, imageUrl, options, existingProduct) {
    return normalizeProduct({
      id: String(savedId || state.editingId || uid('prod')).trim(),
      name: state.form.name,
      price: Number(state.form.price || 0),
      image: String(imageUrl || state.form.imageUrl || '').trim(),
      productType: state.form.productType,
      flashSale: !!state.form.flashSale,
      badges: buildBadges(),
      liveNote: '',
      createdAt: existingProduct && existingProduct.createdAt ? existingProduct.createdAt : String(options.createdAt || Date.now()),
      updatedAt: String(options.updatedAt || Date.now()),
      colorOptions: options.colorOptions || [],
      options: Object.assign({}, options, {
        productType: state.form.productType,
        colorOptions: options.colorOptions || [],
        flashSale: !!state.form.flashSale,
        badges: buildBadges(),
        liveNote: ''
      })
    });
  }

  function upsertLocalProduct(product) {
    const index = state.products.findIndex((item) => item.id === product.id);
    if (index >= 0) state.products.splice(index, 1, product);
    else state.products.unshift(product);
    state.products = sortProducts(state.products);
    refreshLocalProductState();
  }

  function removeLocalProduct(productId) {
    state.products = sortProducts(state.products.filter((item) => item.id !== productId));
    refreshLocalProductState();
  }

  async function saveProduct() {
    if (!validateForm()) return;

    const isEditMode = !!state.editingId;
    const existingProduct = isEditMode ? state.products.find((item) => item.id === state.editingId) : null;
    const oldText = els.saveBtn.textContent;
    els.saveBtn.disabled = true;
    els.saveBtn.textContent = isEditMode ? '수정 중...' : '등록 중...';

    try {
      const options = buildOptionsPayload();
      const basePayload = {
        name: state.form.name,
        price: Number(state.form.price || 0),
        productType: state.form.productType,
        flashSale: !!state.form.flashSale,
        soldOutSoon: !!state.form.soldOutSoon,
        soldOut: !!state.form.soldOut,
        liveNote: '',
        badges: buildBadges(),
        createdAt: options.createdAt,
        updatedAt: options.updatedAt,
        options,
        colorOptions: options.colorOptions
      };

      let result = null;
      let finalImageUrl = String(state.form.imageUrl || '').trim();
      if (isEditMode) {
        const payload = Object.assign({ id: state.editingId, image: finalImageUrl }, basePayload);
        if (state.form.imageBase64) {
          payload.image = state.form.imageBase64;
          payload.fileName = state.form.fileName || ('product_' + Date.now() + '.jpg');
          result = await postJson(Object.assign({ type: 'updateProductWithImage' }, payload));
          if (isFailure(result)) {
            const uploadResult = await postJson({
              type: 'uploadImage',
              image: state.form.imageBase64,
              fileName: payload.fileName
            });
            if (isFailure(uploadResult)) throw new Error(failureMessage(uploadResult, '이미지 업로드 실패'));
            finalImageUrl = (uploadResult.json && getJsonValue(uploadResult.json, 'url')) || '';
            if (!finalImageUrl) throw new Error('이미지 URL을 받지 못했습니다.');
            result = await postJson(Object.assign({ type: 'updateProduct', image: finalImageUrl }, basePayload, { id: state.editingId }));
          } else {
            const resultPayload = getResultPayload(result);
            finalImageUrl = String((resultPayload && resultPayload.image) || finalImageUrl || '').trim();
          }
        } else {
          result = await postJson(Object.assign({ type: 'updateProduct' }, payload));
        }
        if (isFailure(result)) throw new Error(failureMessage(result, '상품 수정 실패'));
      } else {
        const payload = Object.assign({ image: state.form.imageBase64, fileName: state.form.fileName || ('product_' + Date.now() + '.jpg') }, basePayload);
        result = await postJson(Object.assign({ type: 'addProductWithImage' }, payload));
        if (isFailure(result)) {
          const uploadResult = await postJson({
            type: 'uploadImage',
            image: state.form.imageBase64,
            fileName: payload.fileName
          });
          if (isFailure(uploadResult)) throw new Error(failureMessage(uploadResult, '이미지 업로드 실패'));
          finalImageUrl = (uploadResult.json && getJsonValue(uploadResult.json, 'url')) || '';
          if (!finalImageUrl) throw new Error('이미지 URL을 받지 못했습니다.');
          result = await postJson(Object.assign({ type: 'addProduct', image: finalImageUrl }, basePayload));
        } else {
          const resultPayload = getResultPayload(result);
          finalImageUrl = String((resultPayload && resultPayload.image) || finalImageUrl || '').trim();
        }
        if (isFailure(result)) throw new Error(failureMessage(result, '상품 등록 실패'));
      }

      const resultPayload = getResultPayload(result);
      const savedId = String((resultPayload && resultPayload.id) || state.editingId || '').trim();
      const snapshot = buildLocalProductSnapshot(savedId, finalImageUrl, options, existingProduct);
      upsertLocalProduct(snapshot);
      notifyCatalogChanged();
      resetForm();
      showSuccess(isEditMode ? '상품 수정 완료' : '상품 등록 완료', isEditMode ? '변경 내용이 바로 반영되었습니다.' : '새 상품이 바로 목록에 추가되었습니다.');
      Promise.resolve().then(() => loadProducts(true)).catch((error) => console.error(error));
    } catch (error) {
      console.error(error);
      showToast(error && error.message ? error.message : '상품 저장 중 오류가 발생했습니다.');
    } finally {
      els.saveBtn.disabled = false;
      els.saveBtn.textContent = oldText;
      renderForm();
    }
  }

  async function deleteProduct(productId, triggerButton) {
    const product = state.products.find((item) => item.id === productId);
    if (!product) return;
    if (!confirm('"' + product.name + '" 상품을 삭제할까요?')) return;

    const button = triggerButton || null;
    const originalText = button ? button.textContent : '';
    if (button) {
      button.disabled = true;
      button.textContent = '삭제중...';
    }

    try {
      const result = await postJson({ type: 'deleteProduct', id: product.id });
      if (isFailure(result)) throw new Error(failureMessage(result, '삭제 실패'));
      if (state.editingId === product.id) resetForm();
      removeLocalProduct(product.id);
      notifyCatalogChanged();
      showSuccess('상품 삭제 완료', '목록에서 바로 제거되었습니다.');
      Promise.resolve().then(() => loadProducts(true)).catch((error) => console.error(error));
    } catch (error) {
      console.error(error);
      showToast(error && error.message ? error.message : '상품 삭제 중 오류가 발생했습니다.');
      if (button) {
        button.disabled = false;
        button.textContent = originalText;
      }
    }
  }

function bindEvents() {
  els.openShopBtn.addEventListener('click', () => window.open(CONFIG.shopUrl, '_blank', 'noopener'));
  els.cameraBtn.addEventListener('click', () => els.cameraInput.click());
  els.albumBtn.addEventListener('click', () => els.albumInput.click());
  els.cameraInput.addEventListener('change', (event) => handleImageFile(event.target.files && event.target.files[0]));
  els.albumInput.addEventListener('change', (event) => handleImageFile(event.target.files && event.target.files[0]));
  els.editCancelBtn.addEventListener('click', resetForm);
  if (els.nameInput) els.nameInput.addEventListener('input', syncFormFromInputs);
  if (els.priceInput) els.priceInput.addEventListener('input', syncFormFromInputs);
  els.typeInput.addEventListener('change', () => {
    syncFormFromInputs();
    renderColorBoard();
  });
  document.querySelectorAll('[data-toggle-key]').forEach((button) => {
    button.addEventListener('click', () => {
      syncFormFromInputs();
      const key = button.getAttribute('data-toggle-key');
      state.form[key] = !state.form[key];
      renderForm();
    });
  });
  els.addColorBtn.addEventListener('click', () => {
    syncFormFromInputs();
    addColor(els.newColorInput.value);
  });
  els.newColorInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      syncFormFromInputs();
      addColor(els.newColorInput.value);
    }
  });
  els.addSizeBtn.addEventListener('click', () => {
    syncFormFromInputs();
    addCustomSizes(els.newSizeInput.value);
  });
  els.newSizeInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      syncFormFromInputs();
      addCustomSizes(els.newSizeInput.value);
    }
  });
  els.saveBtn.addEventListener('click', saveProduct);
  els.resetBtn.addEventListener('click', resetForm);
  els.deleteBtn.addEventListener('click', () => deleteProduct(state.editingId, els.deleteBtn));
  els.listSearchInput.addEventListener('input', (event) => {
    state.listSearch = event.target.value || '';
    renderProductList();
  });

  document.addEventListener('click', (event) => {
    syncFormFromInputs();
    const statFilter = event.target.closest('[data-list-filter]');
    if (statFilter) {
      state.listFilter = statFilter.getAttribute('data-list-filter') || 'ALL';
      renderProductList();
      return;
    }

    const filterBtn = event.target.closest('.filter-chip[data-list-filter]');
    if (filterBtn) {
      state.listFilter = filterBtn.getAttribute('data-list-filter') || 'ALL';
      renderProductList();
      return;
    }

    const toggleColorBtn = event.target.closest('[data-toggle-color]');
    if (toggleColorBtn) {
      toggleColor(toggleColorBtn.getAttribute('data-toggle-color') || '');
      return;
    }

    const editBtn = event.target.closest('[data-edit-id]');
    if (editBtn) {
      editProduct(editBtn.getAttribute('data-edit-id') || '');
      return;
    }

    const deleteBtn = event.target.closest('[data-delete-id]');
    if (deleteBtn) {
      deleteProduct(deleteBtn.getAttribute('data-delete-id') || '', deleteBtn);
      return;
    }

    const removeColorBtn = event.target.closest('[data-remove-color]');
    if (removeColorBtn) {
      const colorId = removeColorBtn.getAttribute('data-remove-color');
      state.form.colors = state.form.colors.filter((color) => color.id !== colorId);
      renderForm();
      return;
    }

    const removeCustomSizeBtn = event.target.closest('[data-remove-custom-size]');
    if (removeCustomSizeBtn) {
      removeCustomSize(removeCustomSizeBtn.getAttribute('data-remove-custom-size') || '');
      return;
    }

    const enableAllBtn = event.target.closest('[data-enable-all]');
    if (enableAllBtn) {
      const color = state.form.colors.find((item) => item.id === enableAllBtn.getAttribute('data-enable-all'));
      if (color) {
        ensureColorStates();
        Object.keys(color.sizeStates).forEach((sizeKey) => {
          color.sizeStates[sizeKey].enabled = true;
        });
        renderColorBoard();
      }
      return;
    }

    const clearAllBtn = event.target.closest('[data-clear-all]');
    if (clearAllBtn) {
      const color = state.form.colors.find((item) => item.id === clearAllBtn.getAttribute('data-clear-all'));
      if (color) {
        ensureColorStates();
        Object.keys(color.sizeStates).forEach((sizeKey) => {
          color.sizeStates[sizeKey].enabled = false;
          color.sizeStates[sizeKey].soldOut = false;
        });
        renderColorBoard();
      }
    }
  });

  document.addEventListener('change', (event) => {
    syncFormFromInputs();
    if (event.target.matches('[data-color-soldout]')) {
      const colorId = event.target.getAttribute('data-color-soldout');
      const color = state.form.colors.find((item) => item.id === colorId);
      if (!color) return;
      color.soldOut = !!event.target.checked;
      renderColorBoard();
      return;
    }
    if (event.target.matches('[data-size-enabled]')) {
      const parts = String(event.target.getAttribute('data-size-enabled') || '').split('::');
      const color = state.form.colors.find((item) => item.id === parts[0]);
      if (!color) return;
      color.sizeStates[parts[1]] = color.sizeStates[parts[1]] || { enabled: false, soldOut: false };
      color.sizeStates[parts[1]].enabled = !!event.target.checked;
      if (!color.sizeStates[parts[1]].enabled) color.sizeStates[parts[1]].soldOut = false;
      renderColorBoard();
      return;
    }
    if (event.target.matches('[data-size-soldout]')) {
      const parts = String(event.target.getAttribute('data-size-soldout') || '').split('::');
      const color = state.form.colors.find((item) => item.id === parts[0]);
      if (!color) return;
      color.sizeStates[parts[1]] = color.sizeStates[parts[1]] || { enabled: true, soldOut: false };
      color.sizeStates[parts[1]].soldOut = !!event.target.checked;
      renderColorBoard();
    }
  });

  window.addEventListener('storage', (event) => {
    if (event.key === 'ssu_product_catalog_changed' || event.key === CONFIG.versionKey) {
      loadProducts(true);
    }
  });

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) loadProducts(true);
  });
}

  function init() {
    renderForm();
    renderProductList();
    bindEvents();
    if (!hydrateCache()) {
      els.productList.innerHTML = '<div class="empty-state">상품을 불러오는 중입니다.</div>';
    }
    loadProducts(true);
    startVersionPolling();
  }

  init();
})();
</script>
</body>
</html>
